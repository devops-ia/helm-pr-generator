sources:
  pr-generator:
    kind: dockerimage
    spec:
      image: devopsiaci/pr-generator
      architecture: linux/amd64
      versionfilter:
        kind: semver
conditions: {}
targets:
  pr-generator-helm:
    name: bump pr-generator helm chart appVersion
    kind: helmchart
    spec:
      name: charts/pr-generator
      file: Chart.yaml
      key: $.appVersion
      versionincrement: patch
    sourceid: pr-generator