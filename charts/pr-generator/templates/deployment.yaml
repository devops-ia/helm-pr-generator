apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pr-generator.fullname" . }}
  labels:
    {{- include "pr-generator.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # DO NOT increase replicas. pr-generator uses in-memory per-cycle caches and
  # has no distributed coordination. Running >1 active replica causes duplicate
  # PR creation attempts. HA is achieved via liveness/readiness probes and
  # Kubernetes restart policies. If active-standby HA is required, implement
  # leader election via Kubernetes Lease API before changing this value.
  replicas: 1
  selector:
    matchLabels:
      {{- include "pr-generator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Trigger a rollout whenever the config changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "pr-generator.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: default
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # No initContainers — the Docker image already contains all dependencies
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: health
              containerPort: {{ .Values.config.healthPort }}
              protocol: TCP
          env:
            - name: CONFIG_PATH
              value: "/etc/pr-generator/config.yaml"
            {{- if .Values.config.providers.bitbucket.enabled }}
            - name: {{ .Values.config.providers.bitbucket.tokenEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.secrets.bitbucket.existingSecret }}{{ .Values.secrets.bitbucket.existingSecret }}{{ else }}{{ include "pr-generator.fullname" . }}-secrets{{ end }}
                  key: {{ .Values.secrets.bitbucket.tokenKey }}
            {{- end }}
            {{- if and .Values.config.providers.github.enabled (eq .Values.config.providers.github.authMethod "pat") }}
            - name: {{ .Values.config.providers.github.tokenEnv }}
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.secrets.github.existingSecret }}{{ .Values.secrets.github.existingSecret }}{{ else }}{{ include "pr-generator.fullname" . }}-secrets{{ end }}
                  key: {{ .Values.secrets.github.tokenKey }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/pr-generator
              readOnly: true
            {{- if and .Values.config.providers.github.enabled (eq .Values.config.providers.github.authMethod "app") }}
            - name: github-private-key
              mountPath: /secrets/github
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "pr-generator.fullname" . }}-config
        {{- if and .Values.config.providers.github.enabled (eq .Values.config.providers.github.authMethod "app") }}
        - name: github-private-key
          secret:
            secretName: {{ if .Values.secrets.github.existingSecret }}{{ .Values.secrets.github.existingSecret }}{{ else }}{{ include "pr-generator.fullname" . }}-secrets{{ end }}
            items:
              - key: {{ .Values.secrets.github.privateKeyKey }}
                path: {{ .Values.secrets.github.privateKeyKey }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
